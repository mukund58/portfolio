<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="https://mukund.xyz/logo.jpg">
        <link href='https://cdn.boxicons.com/fonts/basic/boxicons.min.css' rel='stylesheet'>
        <link href='https://cdn.boxicons.com/fonts/brands/boxicons-brands.min.css' rel='stylesheet'>

        <title>MyBlog</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script defer>
            tailwind.config = {
                corePlugins: {
                    preflight: false
                },
                darkMode: 'class',
            }
        </script>
        <style>
            body {
                margin: 5;
                padding: 0;
            }
        </style>
    </head>

    <body class="bg-white  dark:bg-[#1c1917] dark:text-white ">
        <nav class="bg-white text-xl dark:bg-[#1c1917] shadow">
            <div class=" mx-auto px-4 py-3 flex justify-around flex-col sm:flex-row  items-center">
                <a href="/" class="dark:filter-none dark:mix-blend-lighten bg-transparent mix-blend-hard-light text-xl font-bold text-gray-900 dark:text-white  md:space-y-0 md:space-x-4 mt-4 md:mt-0">
                    <img src="https://mukund.xyz/logo.jpg" class="w-12 " alt="">
                </a>


                <!-- Navigation links -->
                <div id="menu" class=" md:flex flex-col md:flex-row md:items-center  md:space-y-0 md:space-x-4 mt-4 md:mt-0">
                    <a href="/" class="text-gray-700 dark:text-gray-300 hover:underline">#Home</a>
                    <a href="/blog" class="text-gray-700 dark:text-gray-300 hover:underline">#Blog</a>
                    <a href="/about" class="text-gray-700 dark:text-gray-300 hover:underline">#About</a>
                    <!-- Dark Mode Toggle -->
                    <button id="theme-toggle" class=" bg-inherit text-white border-none text-lg">
                        <i class='bxr  bx-moon text-black'></i>
                        <audio id="toggle-sound" src="https://mukund.xyz/sounds/toggle-button.mp3" preload="auto"></audio>
                    </button>
                </div>
            </div>

            <!-- Optional script for mobile toggle -->

        </nav>


        <section class="section w-full"> 
<h1 class="title p-5">
  List of blog posts
</h1>
<ul class="p-0 m-5 ">
  <!-- If you are using pagination, section.pages will be empty.
       You need to use the paginator object -->  
  <!-- 
  <li><a href="https://mukund.xyz/blog/first/">Why Free software is good ?</a></li>
   -->
  <section class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3 ">
    
      <article class="bg-white border-solid dark:bg-[#1b1b1b]  dark:border-color-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition duration-300">
        <div class="p-6 ">
          <h2 class="text-2xl font-bold text-black dark:text-white">
            <a class="text-black dark:text-white" href="https:&#x2F;&#x2F;mukund.xyz&#x2F;blog&#x2F;first&#x2F;">Why Free software is good ?</a>
          </h2>
          <p class="text-gray-600 dark:text-white mt-2"></p>
          <div class="mt-4 text-sm text-gray-400 dark:text-white">
            November 27, 2019
          </div>
        </div>
      </article>
    
  </section>
  
</ul>

            </section>
        </body>
        <script>
            const mode = document.getElementById('theme-toggle');
            const themeIcon = document.querySelector('#theme-toggle i')
            const userTheme = localStorage.getItem('color-theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const toggleSound = document.getElementById('toggle-sound');
            const html = document.documentElement;
            
            if (userTheme == 'dark') {
                html.classList.add('dark');
                themeIcon.className = 'bxr  bx-sun ';
            } else {
                html.classList.remove('dark');
                themeIcon.className = 'bxr  bx-moon text-black';

            } 
            mode.addEventListener('click', () => {
              toggleSound.currentTime = 0;
              toggleSound.play();
              if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
                themeIcon.className = 'bx bx-moon text-black';
                toggleSound.play();
              } else {
                html.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
                themeIcon.className = 'bx bx-sun';
                toggleSound.play();
                }
            });
        </script>
    </html>
